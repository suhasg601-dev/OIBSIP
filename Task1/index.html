<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
  font-family:"Poppins",Arial,sans-serif;
}
body{margin:0;
  min-height:100vh;display:flex;
  justify-content:center;align-items:center;
  background:#f1e7dc;
}
.calculator{width:340px;
  background:#fffaf6;border-radius:26px;
  padding:18px;box-shadow:0 20px 40px rgba(120,90,70,.25);
  position:relative;
}
.screen{background:#f6ebe1;
  border-radius:18px;padding:14px 16px;
  margin-bottom:16px;position:relative;
}
.expression{
  font-size:13px;color:#8a6a55;min-height:16px;
}
.result{font-size:34px;
  text-align:right;font-weight:600;color:#5a3a2c;
}
.history-btn{
  position:absolute;top:12px;
  right:14px;font-size:18px;
  cursor:pointer;color:#7a5a46;
}
.history-panel{
  display:none;
  position:absolute;top:70px;
  right:0;width:100%;
  background:#fff4ec;border-radius:16px;
  padding:12px;max-height:180px;
  overflow-y:auto;box-shadow:0 12px 30px rgba(120,90,70,.25);
  font-size:13px; color:#6b4b3a;
}
.history-item{margin-bottom:8px;
  border-bottom:1px solid #eadfd5;padding-bottom:6px;
}
.keys{display:grid;
  grid-template-columns:repeat(5,1fr); gap:10px;
}
button{height:52px;
  border:none;border-radius:14px;
  background:#f7eee6;font-size:16px;
  color:#6b4b3a;cursor:pointer;transition:.15s;
}
button:hover{background:#efe2d8}
button:active{transform:scale(.96)}
.soft{background:#efe2d8}
.operator{background:#e6d3c3;font-size:18px}
.enter{
  grid-column:span 2; background:#d8b8a4;
  color:#fff; font-weight:600;
}
.copy{
  background:#ead6c7;font-size:18px;
}
</style>
</head>

<body>
<div class="calculator">
  <div class="screen">
    <div class="expression" id="exp"></div>
    <div class="result" id="res">0</div>
    <div class="history-btn" onclick="toggleHistory()">🕘</div></div>
  <div class="history-panel" id="historyPanel"></div>
  <div class="keys">
    <button class="soft" onclick="add('(')">(</button>
    <button class="soft" onclick="add(')')">)</button>
    <button class="soft" onclick="del()">del</button>
    <button class="soft" onclick="clearAll()">clear</button>
    <button class="operator" onclick="sqrt()">√</button>
    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button class="operator" onclick="add('%')">%</button>
    <button class="operator" onclick="add('/')">÷</button>
    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button class="operator" onclick="add('*')">×</button>
    <button class="operator" onclick="add('-')">−</button>
    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button class="operator" onclick="add('+')">+</button>
    <button class="operator" onclick="sign()">±</button>
    <button onclick="add('.')">.</button>
    <button onclick="add('0')">0</button>
    <button class="enter" onclick="calculate()">ENTER</button>
    <button class="copy" onclick="copyResult()">📋</button>
  </div>
</div>

<script>
let exp="";let history=[];
function update(){document.getElementById("exp").innerText=exp;}
function add(v){exp+=v;update();}function del(){exp=exp.slice(0,-1);update();}
function clearAll(){exp="";document.getElementById("res").innerText="0";update();}

function calculate(){
  try{
    let result=eval(exp);
    document.getElementById("res").innerText=result;
    const time=new Date().toLocaleTimeString();
    history.unshift(`${exp} = ${result} (${time})`);
    renderHistory();exp="";update();
  }catch{
    document.getElementById("res").innerText="Error";
  }
}

function sqrt(){
  try{
    let r=Math.sqrt(eval(exp));
    document.getElementById("res").innerText=r; exp="";update();
  }catch{document.getElementById("res").innerText="Error";}
}

function sign(){if(exp){exp="("+exp+")*-1";update();}
}

function toggleHistory(){
  const panel=document.getElementById("historyPanel");
  panel.style.display=panel.style.display==="block"?"none":"block";
}

function renderHistory(){
  const panel=document.getElementById("historyPanel");panel.innerHTML="";
  history.forEach(item=>{
    const div=document.createElement("div");div.className="history-item";
    div.innerHTML=item;panel.appendChild(div);
  });
}
function copyResult(){
  const value=document.getElementById("res").innerText;navigator.clipboard.writeText(value);
}
</script>
</body>
</html>
